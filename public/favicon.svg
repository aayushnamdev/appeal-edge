<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: rounded square, brand red -->
  <rect width="32" height="32" rx="7" fill="#c3110c"/>

  <!-- Stylized "A" mark — sharp miter apex = the "Edge" -->
  <!-- Left leg -->
  <path d="M6 27 L16 5 L26 27"
        stroke="white" stroke-width="3" fill="none"
        stroke-linejoin="miter" stroke-miterlimit="10"
        stroke-linecap="round"/>

  <!-- Crossbar — slightly offset right to feel asymmetric / designed -->
  <line x1="11.5" y1="20" x2="20.5" y2="20"
        stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Small accent dot at apex — the "Edge" mark -->
  <circle cx="16" cy="4.5" r="1.5" fill="white" opacity="0.6"/>
</svg>
